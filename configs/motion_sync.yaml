rate:
  video: 59.942
  mocap: 100

paths:
  smplx_models: data/smplx_models

rigid_body_solver:
  max_stress: 1e-6
  plane_solver:
    max_stress: 4e-6

time_sync_solver:
  # Reject sync when the (possibly motion-weighted) score is below this; 0 disables.
  min_correlation: 0.28
  # Search only lags in [-max,+max] s (intersected with valid overlap) and reject |lag| above this.
  # Raise if recordings can start minutes apart; lower if false peaks sit just inside the window.
  max_abs_lag_seconds: 20.0
  # Down-weight overlap samples where either foot is nearly static (reduces false NCC peaks).
  motion_weighted_sync: true
  motion_weight_floor_quantile: 0.12
  smplx_joints:
    vicon/Left_Shoe/Left_Shoe:
      - left_ankle
      - left_foot
      - left_big_toe
      - left_small_toe
      - left_heel
    vicon/Right_Shoe/Right_Shoe:
      - right_ankle
      - right_foot
      - right_big_toe
      - right_small_toe
      - right_heel

